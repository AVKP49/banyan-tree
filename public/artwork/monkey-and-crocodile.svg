<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7F2E7"/>
      <stop offset="100%" stop-color="#EDE4D0"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg1)"/>

  <!-- Decorative corner mandalas -->
  <g opacity="0.08" fill="#2E5D4B">
    <circle cx="80" cy="80" r="60"/><circle cx="80" cy="80" r="45" fill="#F7F2E7"/><circle cx="80" cy="80" r="30"/><circle cx="80" cy="80" r="15" fill="#F7F2E7"/>
    <circle cx="944" cy="80" r="60"/><circle cx="944" cy="80" r="45" fill="#F7F2E7"/><circle cx="944" cy="80" r="30"/><circle cx="944" cy="80" r="15" fill="#F7F2E7"/>
    <circle cx="80" cy="944" r="60"/><circle cx="80" cy="944" r="45" fill="#F7F2E7"/><circle cx="80" cy="944" r="30"/><circle cx="80" cy="944" r="15" fill="#F7F2E7"/>
    <circle cx="944" cy="944" r="60"/><circle cx="944" cy="944" r="45" fill="#F7F2E7"/><circle cx="944" cy="944" r="30"/><circle cx="944" cy="944" r="15" fill="#F7F2E7"/>
  </g>

  <!-- Paisley border top -->
  <g opacity="0.06" fill="#B5532A">
    <ellipse cx="200" cy="48" rx="20" ry="8"/><ellipse cx="300" cy="48" rx="20" ry="8"/><ellipse cx="400" cy="48" rx="20" ry="8"/><ellipse cx="500" cy="48" rx="20" ry="8"/><ellipse cx="600" cy="48" rx="20" ry="8"/><ellipse cx="700" cy="48" rx="20" ry="8"/><ellipse cx="824" cy="48" rx="20" ry="8"/>
    <ellipse cx="200" cy="976" rx="20" ry="8"/><ellipse cx="300" cy="976" rx="20" ry="8"/><ellipse cx="400" cy="976" rx="20" ry="8"/><ellipse cx="500" cy="976" rx="20" ry="8"/><ellipse cx="600" cy="976" rx="20" ry="8"/><ellipse cx="700" cy="976" rx="20" ry="8"/><ellipse cx="824" cy="976" rx="20" ry="8"/>
  </g>

  <!-- Double border -->
  <rect x="36" y="36" width="952" height="952" rx="16" fill="none" stroke="#2E5D4B" stroke-width="1" opacity="0.15"/>
  <rect x="48" y="48" width="928" height="928" rx="12" fill="none" stroke="#E07A1F" stroke-width="2" opacity="0.25"/>

  <!-- Stylized tree silhouette -->
  <g opacity="0.07" transform="translate(512, 280)">
    <rect x="-8" y="-20" width="16" height="120" rx="8" fill="#2E5D4B"/>
    <circle cx="0" cy="-60" r="80" fill="#2E5D4B"/>
    <circle cx="-50" cy="-40" r="50" fill="#2E5D4B"/>
    <circle cx="50" cy="-40" r="50" fill="#2E5D4B"/>
    <line x1="-30" y1="20" x2="-35" y2="80" stroke="#2E5D4B" stroke-width="2"/>
    <line x1="30" y1="20" x2="35" y2="80" stroke="#2E5D4B" stroke-width="2"/>
  </g>

  <!-- Water wave pattern -->
  <g opacity="0.06" stroke="#1E3A5F" stroke-width="2" fill="none">
    <path d="M100,750 Q200,730 300,750 Q400,770 500,750 Q600,730 700,750 Q800,770 924,750"/>
    <path d="M100,770 Q200,750 300,770 Q400,790 500,770 Q600,750 700,770 Q800,790 924,770"/>
  </g>

  <!-- Title -->
  <text x="512" y="440" text-anchor="middle" font-family="Georgia, serif" font-size="56" fill="#2A1F17" font-weight="bold" letter-spacing="-1">The Monkey</text>
  <text x="512" y="505" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#2E5D4B" opacity="0.5" font-style="italic">and the</text>
  <text x="512" y="575" text-anchor="middle" font-family="Georgia, serif" font-size="56" fill="#2A1F17" font-weight="bold" letter-spacing="-1">Crocodile</text>

  <!-- Decorative divider -->
  <line x1="350" y1="615" x2="470" y2="615" stroke="#D4A537" stroke-width="1" opacity="0.5"/>
  <circle cx="512" cy="615" r="4" fill="#D4A537" opacity="0.4"/>
  <line x1="554" y1="615" x2="674" y2="615" stroke="#D4A537" stroke-width="1" opacity="0.5"/>

  <!-- Tradition -->
  <text x="512" y="665" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#B5532A" letter-spacing="5" opacity="0.6">PANCHATANTRA</text>
  <text x="512" y="700" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#2A1F17" opacity="0.3">Pan-Indian</text>

  <!-- Small diya at bottom -->
  <g transform="translate(512, 880)" opacity="0.12">
    <ellipse cx="0" cy="0" rx="18" ry="8" fill="#B5532A"/>
    <polygon points="-3,-8 0,-22 3,-8" fill="#E07A1F"/>
    <circle cx="0" cy="-18" r="4" fill="#D4A537" opacity="0.6"/>
  </g>
</svg>
